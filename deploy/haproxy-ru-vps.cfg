# HAProxy config для RU VPS: SNI-роутинг без модуля nginx stream
#
# HAProxy умеет L4 TCP routing по SNI из коробки, без дополнительных модулей.
# Используйте этот конфиг если nginx не имеет модуля stream.
#
# Установка:
#   apt install haproxy
#   cp haproxy-ru-vps.cfg /etc/haproxy/haproxy.cfg
#   systemctl enable haproxy && systemctl restart haproxy
#
# После этого nginx освобождает порт 443 — оставьте его только на порту 80.
# В nginx убедитесь: listen 80; (не listen 443 ssl;)

global
    log /dev/log local0
    maxconn 4096
    user  haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect  5s
    # gRPC heartbeats arrive every ~28 s. HAProxy at 30 s is too tight under DPI
    # (delayed packets push real interval past the limit). 5 m gives enough headroom
    # while still reclaiming dead connections in reasonable time.
    timeout client   5m
    timeout server   5m

# ── Входящий порт 443: читаем SNI, роутим без терминирования TLS ─────────────
frontend https_sni
    bind *:443
    mode tcp

    # Ждём ClientHello (TLS record) перед роутингом.
    # 5 сек — достаточно даже для медленных мобильных сетей.
    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }

    # relay: только клиенты с правильным SNI
    acl is_relay req.ssl_sni -i api.divany-kresla.uk

    use_backend relay     if is_relay
    default_backend       apple_cdn   # всё остальное → Apple CDN anti-probe

# ── Backend: construct-relay ──────────────────────────────────────────────────
backend relay
    mode tcp
    server relay 127.0.0.1:8443 check

# ── Backend: Apple CDN anti-probe ────────────────────────────────────────────
# Сканеры и РКН-зонды попадают сюда. Видят TLS-сертификат Apple.
# IP выглядит как CDN-нода — блокировать опасно.
#
# 17.253.144.10 — anycast Apple CDN. Если не отвечает, попробуйте:
#   dig +short apple.com | head -1
backend apple_cdn
    mode tcp
    server apple 17.253.144.10:443
