user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

# ── Stream: SNI-роутинг на порту 443 (без терминирования TLS) ────────────────
# Требует: apt install libnginx-mod-stream
stream {
    log_format proxy '$remote_addr [$time_local] $protocol $status '
                    '$bytes_sent $bytes_received $session_time "$upstream_addr"';
    access_log /var/log/nginx/stream_access.log proxy;

    map $ssl_preread_server_name $relay_backend {
        api.divany-kresla.uk    127.0.0.1:8443;    # construct-relay
        default                 17.253.144.10:443;  # Apple CDN anti-probe
    }

    server {
        listen 443;
        ssl_preread on;

        proxy_pass            $relay_backend;
        proxy_connect_timeout 5s;
        proxy_timeout         600s;
    }
}

# ── HTTP: cover-сайт (интернет-магазин диванов) + certbot ────────────────────
http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    server {
        listen 80;
        server_name divany-kresla.uk www.divany-kresla.uk;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        root  /var/www/divany-kresla;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location ~* \.(jpg|jpeg|webp|png|gif|svg|ico|css|js|woff2?)$ {
            expires    30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Дропаем bare-IP HTTP запросы (сканеры)
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
